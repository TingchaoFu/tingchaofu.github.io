<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tingchao Fu - Academic Homepage</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <header class="header">
        <div class="container header-inner">
            <div class="logo">
                <div class="logo-name" id="nav-name"></div>
                <div class="logo-title" id="nav-title"></div>
            </div>
            <nav id="nav-menu" class="nav-menu"></nav>
        </div>
    </header>

    <main class="container main-layout">
        <aside class="sidebar" id="sidebar"></aside>
        
        <div class="content">
            <section id="about" class="section"></section>
            <section id="research" class="section"></section>
            <section id="publications" class="section"></section>
            <section id="awards" class="section"></section>
            <section id="academic_service" class="section"></section>
            <section id="education" class="section"></section>
            
            <div class="grid-2-col">
                <section id="cv" class="section"></section>
                <section id="news" class="section"></section>
            </div>
            
            <section id="contact" class="section"></section>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
